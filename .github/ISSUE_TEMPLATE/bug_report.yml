name: 🐛 Bug report
description: Something broken? Tell us what happened.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. **Please don't share
        credentials, API keys, or private code** — this is a public repo.

  - type: textarea
    id: what-happened
    attributes:
      label: What went wrong?
      description: A clear, concise description of the issue.
      placeholder: e.g. "The review verdict never posted on my PR after Auto-review was triggered."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: e.g. "The AI review comment should appear on the PR within 60 seconds."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The more specific, the faster we can fix it.
      placeholder: |
        1. Opened PR #42 on `owner/repo`
        2. Waited 5 minutes
        3. Nothing showed up
        4. Tried "Trigger review" from dashboard — still nothing
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Where did this happen?
      multiple: true
      options:
        - Dashboard (app.looksgoodtomeow.in)
        - Marketing site (looksgoodtomeow.in)
        - Docs (docs.looksgoodtomeow.in)
        - CLI (@tarin/lgtm-cli)
        - GitHub App integration
        - LGTM Security Watchdog Action
        - Webhook / auto-review
        - Billing / Dodo Payments
        - Other
    validations:
      required: true

  - type: input
    id: cli-version
    attributes:
      label: CLI version (if applicable)
      description: Run `lgtm --version`
      placeholder: e.g. 3.0.1

  - type: input
    id: browser
    attributes:
      label: Browser + OS (if applicable)
      placeholder: e.g. Chrome 132 on Windows 11

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots / error messages
      description: Paste any error text, console output, or drag-drop a screenshot. **Redact anything sensitive first.**
      render: text

  - type: checkboxes
    id: sanity
    attributes:
      label: Sanity checks
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I've removed any credentials, tokens, or private code from this report.
          required: true
