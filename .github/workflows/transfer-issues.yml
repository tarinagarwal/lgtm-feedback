name: Transfer Issues to Private Repo

on:
  issues:
    types: [opened]

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Transfer issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TRANSFER_TOKEN }}
          script: |
            const issue = context.payload.issue;

            // Transfer the issue to the private repo
            const mutation = `
              mutation($issueId: ID!, $repoId: ID!) {
                transferIssue(input: { issueId: $issueId, repositoryId: $repoId }) {
                  issue {
                    number
                    url
                  }
                }
              }
            `;

            // Get the target repo ID
            const { repository } = await github.graphql(`
              query {
                repository(owner: "${{ vars.TARGET_OWNER }}", name: "${{ vars.TARGET_REPO }}") {
                  id
                }
              }
            `);

            // Get the issue node ID
            const { repository: sourceRepo } = await github.graphql(`
              query {
                repository(owner: "${context.repo.owner}", name: "${context.repo.repo}") {
                  issue(number: ${issue.number}) {
                    id
                  }
                }
              }
            `);

            const result = await github.graphql(mutation, {
              issueId: sourceRepo.issue.id,
              repoId: repository.id,
            });

            console.log(`Transferred issue #${issue.number} -> ${result.transferIssue.issue.url}`);
