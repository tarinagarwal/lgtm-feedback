name: Copy Issues to Private Repo

on:
  issues:
    types: [opened]

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Copy issue to private repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TRANSFER_TOKEN }}
          script: |
            const issue = context.payload.issue;

            // Create a copy in the private repo
            const { data: created } = await github.rest.issues.create({
              owner: "tarinagarwal",
              repo: "lgtm",
              title: issue.title,
              body: `> Copied from tarinagarwal/lgtm-feedback#${issue.number}\n> Opened by @${issue.user.login}\n\n${issue.body || ""}`,
              labels: issue.labels.map(l => l.name),
            });

            // Comment on the original issue with a confirmation
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `Thanks for filing this! This issue has been picked up by the team and is being tracked internally.`,
            });

            console.log(`Copied issue #${issue.number} -> ${created.html_url}`);
